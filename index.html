<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Год в цветах</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F0E8;--surface:#FDFAF5;--ink:#1A1410;
  --ink2:#6A5C4E;--ink3:rgba(26,20,16,.25);
  --line:rgba(26,20,16,.08);--line2:rgba(26,20,16,.18);
  --awful:#ff0000;--bad:#ff9900;--normal:#ffff00;--good:#00cc00;--super:#0000ff;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;display:flex;flex-direction:column}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea{font-family:inherit;color:var(--ink)}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:500;transition:opacity .4s}
#loading.out{opacity:0;pointer-events:none}
.load-title{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:300;letter-spacing:-.01em}
.load-title em{font-style:italic}
.spin{width:18px;height:18px;border:1.5px solid var(--line2);border-top-color:var(--ink2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:.72rem;color:var(--ink3);letter-spacing:.04em;text-align:center;max-width:280px;line-height:1.5}

/* HEADER */
header{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--line);padding:0 20px;height:48px;display:flex;align-items:center;gap:14px}
.hlogo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;letter-spacing:.01em;flex:1;white-space:nowrap}
.hlogo em{font-style:italic}
.utabs{display:flex;gap:2px;background:rgba(26,20,16,.06);border-radius:8px;padding:2px}
.utab{padding:4px 11px;border-radius:6px;font-size:.72rem;font-weight:500;color:var(--ink2);transition:all .15s;white-space:nowrap}
.utab.on{background:var(--surface);color:var(--ink);box-shadow:0 1px 4px rgba(26,20,16,.1)}
.ynav{display:flex;align-items:center;gap:3px}
.ynum{font-size:.78rem;font-weight:500;min-width:30px;text-align:center;letter-spacing:.03em}
.ybtn{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:var(--ink2);transition:background .12s}
.ybtn:hover{background:rgba(26,20,16,.07)}
.sync{display:flex;align-items:center;gap:5px;font-size:.65rem;color:var(--ink3)}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--good);flex-shrink:0}
.sdot.busy{background:var(--normal);animation:pulse .9s infinite}
.sdot.err{background:var(--awful)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* LEGEND */
.legend{flex-shrink:0;padding:0 20px;height:30px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;overflow:hidden}
.leg{display:flex;align-items:center;gap:5px;font-size:.65rem;color:var(--ink2);white-space:nowrap}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-r{margin-left:auto;font-size:.75rem;color:var(--ink3);font-style:italic;font-family:'Cormorant Garamond',serif;white-space:nowrap}

/* GRID */
.grid-area{flex:1;overflow:auto;padding:14px 20px 28px}
.year-grid{
  display:grid;
  grid-template-columns:16px repeat(12,1fr);
  /* строки: 1 заголовок + 31 день, все одинаковые */
  grid-template-rows: 20px repeat(31, 1fr);
  gap:3px;
}
.gc{grid-row:1;grid-column:1}
.gm{grid-row:1;text-align:center;font-size:.56rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--ink2);padding-bottom:2px;align-self:end}
.dl{font-size:.56rem;color:var(--ink3);display:flex;align-items:center;justify-content:flex-end;padding-right:2px;grid-column:1}

/* ОБЫЧНАЯ ЯЧЕЙКА */
.c{
  border-radius:50%;
  background:rgba(26,20,16,.06);cursor:pointer;
  position:relative;display:flex;align-items:center;justify-content:center;
  transition:transform .12s;
  /* квадрат через aspect-ratio когда span=1 */
  aspect-ratio:1/1;
}
.c:hover{transform:scale(1.28);z-index:10}
.c.na{background:transparent;pointer-events:none;aspect-ratio:1/1}
.c[data-m=awful]{background:var(--awful)}
.c[data-m=bad]{background:var(--bad)}
.c[data-m=normal]{background:var(--normal)}
.c[data-m=good]{background:var(--good)}
.c[data-m=super]{background:var(--super)}
.c.today{outline:2px solid var(--ink);outline-offset:1px}
.cem{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(5px,1vw,10px);line-height:1}
.cpip{position:absolute;bottom:14%;right:14%;width:18%;height:18%;border-radius:50%;background:rgba(255,255,255,.7)}
.c[data-m=""]:not(.na) .cpip{background:rgba(26,20,16,.3)}

/* ОБЪЕДИНЁННАЯ ЯЧЕЙКА */
.c.merged{
  aspect-ratio:unset;   /* убираем квадрат — пусть заполняет span строк */
  border-radius:24px;   /* пилюля */
  background:rgba(26,20,16,.08);
  cursor:default;
  pointer-events:none;
  align-self:stretch;   /* растянуть на весь спан + gap'ы */
}
.c.merged .merge-lbl{
  font-size:.55rem;color:var(--ink3);
  writing-mode:vertical-rl;text-orientation:mixed;
  letter-spacing:.04em;
}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(26,20,16,.3);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,0,.15,1)}
.overlay.open .sheet{transform:translateY(0)}
.drag{width:36px;height:3px;border-radius:2px;background:rgba(26,20,16,.1);margin:11px auto 0}
.sh-head{padding:14px 20px 8px;display:flex;align-items:flex-start;justify-content:space-between}
.sh-ttl{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;line-height:1.1}
.sh-ttl em{font-style:italic}
.sh-sub{font-size:.7rem;color:var(--ink2);margin-top:3px}
.sh-x{width:27px;height:27px;border-radius:50%;background:rgba(26,20,16,.06);color:var(--ink2);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;transition:background .12s;margin-top:2px}
.sh-x:hover{background:rgba(26,20,16,.12)}
.sh-body{padding:4px 20px 28px;max-height:75vh;overflow-y:auto}
.slbl{font-size:.6rem;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.mpick{display:flex;gap:10px;margin-bottom:28px}
.mwrap{display:flex;flex-direction:column;align-items:center;gap:7px;flex:1;cursor:pointer}
.mbtn{width:100%;aspect-ratio:1/1;max-width:46px;border-radius:50%;opacity:.28;transition:opacity .15s,transform .15s;pointer-events:none}
.mwrap:hover .mbtn{opacity:.55}
.mwrap.on .mbtn{opacity:1;transform:scale(1.12)}
.mbtn[data-m=awful]{background:var(--awful)}
.mbtn[data-m=bad]{background:var(--bad)}
.mbtn[data-m=normal]{background:var(--normal)}
.mbtn[data-m=good]{background:var(--good)}
.mbtn[data-m=super]{background:var(--super)}
.mlbl{font-size:.58rem;color:var(--ink2);white-space:nowrap;text-align:center;line-height:1.2}
.note{width:100%;border:1px solid var(--line2);border-radius:10px;padding:9px 11px;font-size:.8rem;line-height:1.65;background:var(--bg);resize:none;height:80px;margin-bottom:14px;transition:border-color .15s}
.note:focus{outline:none;border-color:var(--ink2)}
.em-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.em-row label{font-size:.73rem;color:var(--ink2);flex:1}
.em-in{width:56px;border:1px solid var(--line2);border-radius:8px;padding:5px 8px;font-size:1rem;text-align:center;background:var(--bg)}
.em-in:focus{outline:none;border-color:var(--ink2)}
.pzone{border:1.5px dashed var(--line2);border-radius:10px;padding:12px;text-align:center;margin-bottom:14px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .15s}
.pzone:hover{border-color:var(--ink2)}
.pzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pz-t{font-size:.76rem;font-weight:500;color:var(--ink)}
.pz-s{font-size:.68rem;color:var(--ink2);margin-top:2px}
.pz-load{font-size:.68rem;color:var(--ink2);margin-top:6px;display:none}
.pz-img{width:100%;max-height:90px;object-fit:cover;border-radius:7px;margin-top:7px;display:none}
.pz-link{font-size:.68rem;color:var(--super);margin-top:5px;display:none;text-decoration:none}
.srow{display:flex;gap:8px}
.btn-s{flex:1;background:var(--ink);color:#fff;border-radius:10px;padding:10px;font-size:.8rem;font-weight:500;letter-spacing:.02em;transition:opacity .15s}
.btn-s:hover{opacity:.85}
.btn-s:disabled{opacity:.3;cursor:default}
.btn-c{background:rgba(26,20,16,.06);color:var(--ink2);border-radius:10px;padding:10px 13px;font-size:.8rem;transition:background .12s}
.btn-c:hover{background:rgba(26,20,16,.12)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--ink);color:#fff;padding:7px 14px;border-radius:7px;font-size:.72rem;opacity:0;pointer-events:none;transition:all .2s;z-index:600;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.bad{background:var(--awful)}
@media(max-width:500px){header,.legend,.grid-area{padding-left:12px;padding-right:12px}.mpick{gap:7px}}
</style>
</head>
<body>

<div id="loading">
  <div class="load-title">Год в <em>цветах</em></div>
  <div class="spin"></div>
  <div class="ltxt" id="ltxt">загрузка данных…</div>
</div>

<header>
  <div class="hlogo">Год в <em>цветах</em></div>
  <div class="utabs">
    <button class="utab on" data-u="snaapsy"      onclick="switchUser('snaapsy')">🌙 Snaapsy</button>
    <button class="utab"    data-u="winnieshe4k0" onclick="switchUser('winnieshe4k0')">☀️ Winnie</button>
  </div>
  <div class="ynav">
    <button class="ybtn" onclick="changeYear(-1)">‹</button>
    <span class="ynum" id="ynum"></span>
    <button class="ybtn" onclick="changeYear(1)">›</button>
  </div>
  <div class="sync"><div class="sdot" id="sd"></div><span id="st">загрузка…</span></div>
</header>

<div class="legend">
  <div class="leg"><div class="ldot" style="background:var(--awful)"></div>Ужасный</div>
  <div class="leg"><div class="ldot" style="background:var(--bad)"></div>Плохой</div>
  <div class="leg"><div class="ldot" style="background:var(--normal)"></div>Обычный</div>
  <div class="leg"><div class="ldot" style="background:var(--good)"></div>Хороший</div>
  <div class="leg"><div class="ldot" style="background:var(--super)"></div>Супер</div>
  <span class="leg-r">✦ особое событие</span>
</div>

<div class="grid-area">
  <div class="year-grid" id="grid"></div>
</div>

<div class="overlay" id="ov" onclick="bgClose(event)">
  <div class="sheet">
    <div class="drag"></div>
    <div class="sh-head">
      <div>
        <div class="sh-ttl" id="sttl">—</div>
        <div class="sh-sub" id="ssub">—</div>
      </div>
      <button class="sh-x" onclick="closeSheet()">✕</button>
    </div>
    <div class="sh-body">
      <div class="slbl" style="margin-bottom:14px">Настроение</div>
      <div class="mpick">
        <div class="mwrap" onclick="pickMood('awful')"><div class="mbtn" data-m="awful"></div><span class="mlbl">Ужасный</span></div>
        <div class="mwrap" onclick="pickMood('bad')"><div class="mbtn" data-m="bad"></div><span class="mlbl">Плохой</span></div>
        <div class="mwrap" onclick="pickMood('normal')"><div class="mbtn" data-m="normal"></div><span class="mlbl">Обычный</span></div>
        <div class="mwrap" onclick="pickMood('good')"><div class="mbtn" data-m="good"></div><span class="mlbl">Хороший</span></div>
        <div class="mwrap" onclick="pickMood('super')"><div class="mbtn" data-m="super"></div><span class="mlbl">Супер</span></div>
      </div>
      <div class="slbl">Заметки</div>
      <textarea class="note" id="noteIn" placeholder="Что было сегодня?"></textarea>
      <div class="em-row">
        <label>Особое событие ✦</label>
        <input class="em-in" id="emIn" placeholder="🎉" maxlength="4">
      </div>
      <div class="slbl">Фото → Google Drive</div>
      <div class="pzone">
        <input type="file" accept="image/*" id="pInput" onchange="onPhoto(event)">
        <div class="pz-t">Прикрепить фото</div>
        <div class="pz-s">нажми или перетащи сюда</div>
        <div class="pz-load" id="pLoader">Загрузка на Drive…</div>
        <img class="pz-img" id="pImg">
        <a class="pz-link" id="pLink" target="_blank">📎 Открыть на Drive →</a>
      </div>
      <div class="srow">
        <button class="btn-s" id="btnSave" onclick="saveDay()">Сохранить</button>
        <button class="btn-c" onclick="clearForm()">Очистить</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyUkha28zbh4kVp_gIZTogqTvJDlyy_WVhkc6t4RdLuVkislgqdWvk9ExywV-V7vc4o/exec';

const MS  = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
const MG  = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const DW  = ['вс','пн','вт','ср','чт','пт','сб'];
const DIM = [31,28,31,30,31,30,31,31,30,31,30,31];
const NOW   = new Date();
const TODAY = {y:NOW.getFullYear(), m:NOW.getMonth(), d:NOW.getDate()};

const S = {
  user:'snaapsy', year:TODAY.y,
  data:{snaapsy:{}, winnieshe4k0:{}},
  merges:{},
  edit:null, mood:null, photoUrl:null,
};

document.getElementById('ynum').textContent = S.year;
try {
  const c = localStorage.getItem('gvc');
  if (c) {
    const p = JSON.parse(c);
    if (p.data && p.merges) { S.data = p.data; S.merges = p.merges; renderGrid(); }
    else localStorage.removeItem('gvc'); // старый формат — сбрасываем
  }
} catch(e) { localStorage.removeItem('gvc'); }
loadYear();

// ═══ JSONP ═══
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = '_cb'+Date.now();
    const to = setTimeout(()=>{ delete window[cb]; reject(new Error('Timeout')); }, 20000);
    window[cb] = data => { clearTimeout(to); delete window[cb]; data.error?reject(new Error(data.error)):resolve(data); };
    const tag = document.createElement('script');
    tag.src = `${API}?${new URLSearchParams({...params, callback:cb})}`;
    tag.onerror = ()=>{ clearTimeout(to); delete window[cb]; reject(new Error('Network error')); };
    document.head.appendChild(tag);
    setTimeout(()=>{ try{document.head.removeChild(tag)}catch(e){} }, 25000);
  });
}

async function loadYear() {
  setSyncing(true);
  try {
    const d = await jsonp({action:'getData', year:S.year});
    S.data   = {snaapsy: d.snaapsy||{}, winnieshe4k0: d.winnieshe4k0||{}};
    // Code.gs возвращает merged как массив [{user,month,day,span}]
    // Конвертируем в словарь "user-month-day": span
    S.merges = {};
    (d.merged || d.merges || []).forEach(mg => {
      if (mg.user !== undefined) {
        S.merges[`${mg.user}-${mg.month}-${mg.day}`] = mg.span;
      }
    });
    localStorage.setItem('gvc', JSON.stringify({data:S.data, merges:S.merges}));
    renderGrid();
    setSyncing(false);
  } catch(e) {
    setSyncing(false,true);
    toast('Ошибка: '+e.message, true);
  } finally { fadeOut(); }
}

// ═══ GRID — с поддержкой объединённых ячеек ═══
function renderGrid() {
  const leap = (S.year%4===0&&S.year%100!==0)||S.year%400===0;
  const dim  = [...DIM]; if(leap) dim[1]=29;

  // Строим множество "закрытых" ячеек (перекрытых объединением)
  const covered = new Set(); // "m-d"
  for (const [key, span] of Object.entries(S.merges)) {
    const parts = key.split('-');
    const user  = parts[0]+'-'+parts[1]; // "snaapsy" или "winnieshe4k0" (может содержать цифры)
    // key формат: "snaapsy-0-7" или "winnieshe4k0-0-7"
    // Парсим правильно
    const m = parseInt(parts[parts.length-2]);
    const d = parseInt(parts[parts.length-1]);
    const u = parts.slice(0,-2).join('-');
    if (u !== S.user) continue;
    for (let i = 1; i < span; i++) covered.add(`${m}-${d+i}`);
  }

  let h = '<div class="gc"></div>';
  MS.forEach((mn, i) => h += `<div class="gm" style="grid-column:${i+2}">${mn}</div>`);

  for (let d = 1; d <= 31; d++) {
    const row = d + 1; // строка в grid (1=заголовок, 2=день1 ...)
    h += `<div class="dl" style="grid-row:${row}">${d}</div>`;

    for (let m = 0; m < 12; m++) {
      const col = m + 2;

      // Пропускаем ячейки, перекрытые объединением
      if (covered.has(`${m}-${d}`)) continue;

      if (d > dim[m]) {
        h += `<div class="c na" style="grid-row:${row};grid-column:${col}"></div>`;
        continue;
      }

      // Проверяем, является ли эта ячейка началом объединения
      const mergeKey = `${S.user}-${m}-${d}`;
      const span = S.merges[mergeKey] || 1;
      const rowStyle = span > 1
        ? `grid-row:${row}/span ${span}`
        : `grid-row:${row}`;

      const e  = S.data[S.user]?.[`${m}-${d}`];
      const md = e?.mood  || '';
      const em = e?.emoji || '';
      const nt = !!(e?.note);
      const isToday = S.year===TODAY.y && m===TODAY.m && d===TODAY.d;

      if (span > 1) {
        // Объединённая ячейка — показываем цвет и делаем кликабельной
        h += `<div class="c merged${isToday?' today':''}"${md?` data-m="${md}"`:''} style="${rowStyle};grid-column:${col}" onclick="openCell(${m},${d})">
          ${em?`<span class="cem">${em}</span>`:''}
          ${(nt||md)?'<div class="cpip"></div>':''}
        </div>`;
      } else {
        h += `<div class="c${isToday?' today':''}"${md?` data-m="${md}"`:''} style="${rowStyle};grid-column:${col}" onclick="openCell(${m},${d})">
          ${em?`<span class="cem">${em}</span>`:''}
          ${(nt||md)?'<div class="cpip"></div>':''}
        </div>`;
      }
    }
  }
  document.getElementById('grid').innerHTML = h;
}

// ═══ CELL ═══
function openCell(m, d) {
  S.edit={m,d};
  const e=S.data[S.user]?.[`${m}-${d}`]||{};
  S.mood=e.mood||null; S.photoUrl=e.photoUrl||null;
  const dt=new Date(S.year,m,d);
  document.getElementById('sttl').innerHTML=`${d} <em>${MG[m]}</em>`;
  document.getElementById('ssub').textContent=`${DW[dt.getDay()]}, ${S.year}  ·  ${S.user==='snaapsy'?'🌙 Snaapsy':'☀️ Winnieshe4k0'}`;
  document.getElementById('noteIn').value=e.note||'';
  document.getElementById('emIn').value=e.emoji||'';
  document.getElementById('pImg').style.display='none';
  document.getElementById('pLoader').style.display='none';
  document.getElementById('pInput').value='';
  const lnk=document.getElementById('pLink');
  lnk.style.display=S.photoUrl?'block':'none';
  if(S.photoUrl) lnk.href=S.photoUrl;
  document.querySelectorAll('.mwrap').forEach(w=>w.classList.toggle('on',w.querySelector('.mbtn').dataset.m===S.mood));
  document.getElementById('ov').classList.add('open');
}
function pickMood(id){ S.mood=S.mood===id?null:id; document.querySelectorAll('.mwrap').forEach(w=>w.classList.toggle('on',w.querySelector('.mbtn').dataset.m===S.mood)); }
function clearForm(){
  S.mood=null; S.photoUrl=null;
  document.querySelectorAll('.mwrap').forEach(w=>w.classList.remove('on'));
  ['noteIn','emIn'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pImg').style.display='none';
  document.getElementById('pLink').style.display='none';
}

// ═══ PHOTO ═══
function onPhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{ const img=document.getElementById('pImg'); img.src=ev.target.result; img.style.display='block'; uploadPhoto(file,ev.target.result); };
  r.readAsDataURL(file);
}
async function uploadPhoto(file,dataUrl){
  document.getElementById('pLoader').style.display='block';
  try {
    const {m,d}=S.edit;
    const res=await jsonp({action:'uploadPhoto',base64:dataUrl.split(',')[1],mimeType:file.type,filename:encodeURIComponent(file.name),user:S.user,month:m,day:d,year:S.year});
    S.photoUrl=res.url;
    const lnk=document.getElementById('pLink'); lnk.href=res.url; lnk.style.display='block';
    toast('Фото загружено ✓');
  } catch(e){ toast('Ошибка фото: '+e.message,true); }
  finally{ document.getElementById('pLoader').style.display='none'; }
}

// ═══ SAVE ═══
async function saveDay(){
  const {m,d}=S.edit;
  const note=document.getElementById('noteIn').value.trim();
  const emoji=document.getElementById('emIn').value.trim();
  const btn=document.getElementById('btnSave');
  btn.disabled=true; btn.textContent='Сохраняю…';
  const key=`${m}-${d}`;
  if(S.mood||note||emoji||S.photoUrl){ if(!S.data[S.user]) S.data[S.user]={}; S.data[S.user][key]={mood:S.mood,note,emoji,photoUrl:S.photoUrl||''}; }
  else delete S.data[S.user]?.[key];
  localStorage.setItem('gvc', JSON.stringify({data:S.data,merges:S.merges}));
  renderGrid();
  setSyncing(true);
  try {
    await jsonp({action:'saveDay',user:S.user,month:m,day:d,mood:S.mood||'',note:encodeURIComponent(note),emoji:encodeURIComponent(emoji)});
    setSyncing(false); toast('Сохранено ✓');
  } catch(e){ setSyncing(false,true); toast('Ошибка: '+e.message,true); }
  btn.disabled=false; btn.textContent='Сохранить';
  closeSheet();
}

// ═══ NAV ═══
function switchUser(u){
  S.user=u;
  document.querySelectorAll('.utab').forEach(b=>b.classList.toggle('on',b.dataset.u===u));
  renderGrid();
}
function changeYear(delta){
  S.year+=delta;
  document.getElementById('ynum').textContent=S.year;
  S.data={snaapsy:{},winnieshe4k0:{}}; S.merges={};
  renderGrid();
  const ld=document.getElementById('loading');
  ld.classList.remove('out'); ld.style.display='flex';
  document.getElementById('ltxt').textContent=`загрузка ${S.year}…`;
  loadYear();
}

// ═══ UI ═══
function closeSheet(){document.getElementById('ov').classList.remove('open')}
function bgClose(e){if(e.target.id==='ov')closeSheet()}
function fadeOut(){const el=document.getElementById('loading');el.classList.add('out');setTimeout(()=>el.style.display='none',450)}
function setSyncing(on,err=false){document.getElementById('sd').className='sdot'+(on?' busy':err?' err':'');document.getElementById('st').textContent=on?'синхронизация…':err?'ошибка':'синхронизировано'}
let _tt;
function toast(msg,bad=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on'+(bad?' bad':'');clearTimeout(_tt);_tt=setTimeout(()=>t.className='toast',3500)}
</script>
</body>
